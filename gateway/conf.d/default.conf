# Docker's embedded DNS lets the gateway start even if a target service is stopped.
resolver 127.0.0.11 ipv6=off valid=10s;

server {
    listen 80 default_server;
    server_name localhost _;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location = /gateway-health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location = /api/chat {
        limit_req zone=chat_api burst=7 nodelay;
        limit_req_status 429;
        client_max_body_size 8k;

        error_page 413 = @chat_body_too_large;
        error_page 429 = @chat_rate_limited;

        set $frontend_url http://frontend:5173;
        proxy_pass $frontend_url;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 40s;
        proxy_send_timeout 40s;
        proxy_buffering off;
    }

    location @chat_body_too_large {
        default_type application/json;
        return 413 '{"error":"Request body is too large."}';
    }

    location @chat_rate_limited {
        default_type application/json;
        add_header Retry-After 12 always;
        return 429 '{"error":"Too many chatbot requests. Please retry shortly."}';
    }

    location / {
        set $frontend_url http://frontend:5173;
        proxy_pass $frontend_url;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_buffering off;
    }
}

server {
    listen 80;
    server_name cms.localhost cms.vloth.tech;

    client_max_body_size 100m;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location / {
        set $strapi_url http://strapi:1337;
        proxy_pass $strapi_url;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering off;
    }
}
