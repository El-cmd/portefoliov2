user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format gateway '$remote_addr - $host [$time_local] "$request" '
                       '$status $body_bytes_sent "$http_referer" '
                       '"$http_user_agent" upstream=$upstream_addr '
                       'upstream_status=$upstream_status request_time=$request_time';

    access_log /var/log/nginx/access.log gateway;

    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    # Nginx Proxy Manager runs on a Docker bridge network in production.
    set_real_ip_from 172.16.0.0/12;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    limit_req_zone $binary_remote_addr zone=chat_api:10m rate=5r/m;

    include /etc/nginx/conf.d/*.conf;
}
